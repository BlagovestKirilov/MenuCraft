services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    container_name: menucraft_elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.license.self_generated.type=basic
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - cluster.name=menucraft-logs
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - elk
    restart: always
    mem_limit: 1g

  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.0
    container_name: menucraft_kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - xpack.security.enabled=false
      - SERVER_BASEPATH=/kibana
      - SERVER_REWRITEBASEPATH=true
    networks:
      - elk
      - web
    depends_on:
      - elasticsearch
    restart: always
    mem_limit: 512m

  filebeat:
    image: docker.elastic.co/beats/filebeat:8.15.0
    container_name: menucraft_filebeat
    user: root
    volumes:
      - ./filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - /home/ubuntu/menucraft/backend_logs:/var/log/menucraft:ro
    networks:
      - elk
    depends_on:
      - elasticsearch
    restart: always
    mem_limit: 256m

volumes:
  es_data:

networks:
  elk:
    driver: bridge
  web:
    external: true
