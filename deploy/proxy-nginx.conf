worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ================================================================
    # CLOUDFLARE CONFIG (for deck.bg only)
    # ================================================================

    # Cloudflare IP ranges (IPv4 & IPv6)
    # https://www.cloudflare.com/ips/
    geo $realip_remote_addr $cloudflare_ip {
        default 0;

        # IPv4
        103.21.244.0/22 1;
        103.22.200.0/22 1;
        103.31.4.0/22 1;
        104.16.0.0/13 1;
        104.24.0.0/14 1;
        108.162.192.0/18 1;
        131.0.72.0/22 1;
        141.101.64.0/18 1;
        162.158.0.0/15 1;
        172.64.0.0/13 1;
        173.245.48.0/20 1;
        188.114.96.0/20 1;
        190.93.240.0/20 1;
        197.234.240.0/22 1;
        198.41.128.0/17 1;

        # IPv6
        2400:cb00::/32 1;
        2405:8100::/32 1;
        2405:b500::/32 1;
        2606:4700::/32 1;
        2803:f800::/32 1;
        2c0f:f248::/32 1;
        2a06:98c0::/29 1;
    }

    map $cloudflare_ip $allow_cloudflare {
        0 "403";
        1 "";
    }

    # Extract real IP from CF-Connecting-IP header for rate limiting (deck.bg)
    map $http_cf_connecting_ip $limit_key {
        ""      $remote_addr;
        default $http_cf_connecting_ip;
    }

    limit_req_log_level notice;

    # Rate limiting zones for deck.bg
    limit_req_zone $limit_key zone=auth_limit:10m rate=10r/m;
    limit_req_zone $limit_key zone=game_limit:10m rate=30r/m;
    limit_req_zone $limit_key zone=user_limit:10m rate=10r/m;
    limit_conn_zone $limit_key zone=addr_limit:10m;
    limit_req_status 429;

    # Rate limiting zones for menucraft.online
    limit_req_zone $remote_addr zone=mc_api_limit:10m rate=30r/m;

    # ================================================================
    # deck.bg — HTTP -> HTTPS Redirect
    # ================================================================
    server {
        listen 80;
        server_name deck.bg www.deck.bg;

        if ($allow_cloudflare = "403") {
            return 403 "Access denied. Please use Cloudflare.";
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ================================================================
    # menucraft.online — HTTP (certbot challenge + redirect)
    # ================================================================
    server {
        listen 80;
        server_name menucraft.online www.menucraft.online;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ================================================================
    # deck.bg — HTTPS (Cloudflare origin certs)
    # ================================================================
    server {
        listen 443 ssl;
        server_name deck.bg www.deck.bg;

        if ($allow_cloudflare = "403") {
            return 403 "Access denied. Please use Cloudflare.";
        }

        # Cloudflare origin certificates
        ssl_certificate /etc/ssl/cloudflare/origin.pem;
        ssl_certificate_key /etc/ssl/cloudflare/private.key;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # Cloudflare Real IP
        real_ip_header CF-Connecting-IP;
        real_ip_recursive on;

        # Cloudflare trusted proxies
        set_real_ip_from 103.21.244.0/22;
        set_real_ip_from 103.22.200.0/22;
        set_real_ip_from 103.31.4.0/22;
        set_real_ip_from 104.16.0.0/13;
        set_real_ip_from 104.24.0.0/14;
        set_real_ip_from 108.162.192.0/18;
        set_real_ip_from 131.0.72.0/22;
        set_real_ip_from 141.101.64.0/18;
        set_real_ip_from 162.158.0.0/15;
        set_real_ip_from 172.64.0.0/13;
        set_real_ip_from 173.245.48.0/20;
        set_real_ip_from 188.114.96.0/20;
        set_real_ip_from 190.93.240.0/20;
        set_real_ip_from 197.234.240.0/22;
        set_real_ip_from 198.41.128.0/17;
        set_real_ip_from 2400:cb00::/32;
        set_real_ip_from 2405:8100::/32;
        set_real_ip_from 2405:b500::/32;
        set_real_ip_from 2606:4700::/32;
        set_real_ip_from 2803:f800::/32;
        set_real_ip_from 2c0f:f248::/32;
        set_real_ip_from 2a06:98c0::/29;

        # Global proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;

        # Frontend
        location / {
            proxy_pass http://santase_frontend:80;
        }

        # Auth API
        location /api/auth/ {
            limit_req zone=auth_limit burst=5 nodelay;
            proxy_pass http://santase_backend:8080/auth/;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Host $host;
        }

        # Game API
        location /api/game/ {
            limit_req zone=game_limit burst=10 nodelay;
            proxy_pass http://santase_backend:8080/game/;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization;
        }

        # User API
        location /api/user/ {
            limit_req zone=user_limit burst=5 nodelay;
            proxy_pass http://santase_backend:8080/user/;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization;
        }

        # WebSocket
        location /api/ws-game/ {
            proxy_pass http://santase_backend:8080/ws-game/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # ================================================================
    # menucraft.online — HTTPS (Let's Encrypt / certbot)
    # ================================================================
    server {
        listen 443 ssl;
        server_name menucraft.online www.menucraft.online;

        ssl_certificate /etc/letsencrypt/live/menucraft.online/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/menucraft.online/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # Proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Frontend (React SPA)
        location / {
            proxy_pass http://menucraft_frontend:80;
        }

        # Backend API — all routes under /api/ are proxied to the backend
        location /api/ {
            limit_req zone=mc_api_limit burst=15 nodelay;
            proxy_pass http://menucraft_backend:8090/;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization;
        }
    }
}
