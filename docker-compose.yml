services:
  frontend:
    image: ${DOCKERHUB_USERNAME}/menucraft_frontend:latest
    container_name: menucraft_frontend
    restart: always
    environment:
      - TZ=Europe/Sofia
    networks:
      - web

  backend:
    image: ${DOCKERHUB_USERNAME}/menucraft_backend:latest
    container_name: menucraft_backend
    restart: always
    env_file: .env
    volumes:
      - /home/ubuntu/menucraft/backend_logs:/app/logs
    environment:
      - TZ=Europe/Sofia
      - JAVA_OPTS=-Duser.timezone=Europe/Sofia
      - OTEL_SERVICE_NAME=MenuCraft
      - OTEL_RESOURCE_ATTRIBUTES=deployment.environment=production
      - OTEL_EXPORTER_OTLP_ENDPOINT=${ELASTIC_APM_SERVER_URL}
      - OTEL_EXPORTER_OTLP_HEADERS=Authorization=ApiKey ${ELASTIC_APM_API_KEY}
      - OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
      - OTEL_LOGS_EXPORTER=otlp
      - OTEL_METRICS_EXPORTER=otlp
      - OTEL_TRACES_EXPORTER=otlp
    networks:
      - web

networks:
  web:
    external: true
