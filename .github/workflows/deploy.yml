name: Build and Deploy MenuCraft to EC2

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      # ── Backend Build ──
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Set up Maven
        run: sudo apt-get update && sudo apt-get install -y maven

      - name: Build Spring Boot JAR
        run: mvn clean package -DskipTests

      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      # ── Backend Docker Image ──
      - name: Build and push backend image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/menucraft_backend:latest .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/menucraft_backend:latest

      # ── Frontend Docker Image ──
      - name: Build and push frontend image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/menucraft_frontend:latest ./frontend
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/menucraft_frontend:latest

      # ── Copy files to EC2 ──
      - name: Copy project files to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          source: "docker-compose.yml"
          target: "/home/ubuntu/menucraft"

      # ── Deploy on EC2 ──
      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.2.1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            set -e
            cd /home/ubuntu/menucraft

            echo "Logging into Docker Hub..."
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

            echo "Creating environment file..."
            cat << 'EOF' > .env
            DB_URL_MENU_CRAFT=${{ secrets.DB_URL_MENU_CRAFT }}
            DB_USERNAME=${{ secrets.DB_USERNAME }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DB_DIALECT=${{ secrets.DB_DIALECT }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_EXPIRATION=${{ secrets.JWT_EXPIRATION }}
            JWT_REFRESH_EXPIRATION=${{ secrets.JWT_REFRESH_EXPIRATION }}
            FACEBOOK_APP_ID=${{ secrets.FACEBOOK_APP_ID }}
            FACEBOOK_APP_SECRET=${{ secrets.FACEBOOK_APP_SECRET }}
            FACEBOOK_REDIRECT_URI=${{ secrets.FACEBOOK_REDIRECT_URI }}
            GRAPH_API_URL=${{ secrets.GRAPH_API_URL }}
            AES_ENCRYPTION_SECRET=${{ secrets.AES_ENCRYPTION_SECRET }}
            DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
            EOF

            echo "Ensuring shared network exists..."
            docker network create web 2>/dev/null || true

            echo "Pulling latest images..."
            docker compose pull

            echo "Restarting MenuCraft containers..."
            docker compose up -d --force-recreate --remove-orphans

            echo "Reloading nginx proxy..."
            docker exec nginx_proxy nginx -s reload 2>/dev/null || echo "Proxy not running yet, skipping reload."

            echo "Cleaning up unused Docker data..."
            docker image prune -f
